mixed-port: 7890
allow-lan: false
mode: rule
log-level: warning
ipv6: false
external-controller: 127.0.0.1:9090

dns:
  enable: true
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.0/15
  nameserver:
    - 1.1.1.1
    - 8.8.8.8
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr:
      - 240.0.0.0/4
  nameserver-policy:
    "*.ru": 77.88.8.8
    "*.su": 77.88.8.8
    "*.рф": 77.88.8.8
  fake-ip-filter:
    - "*.local"
    - localhost
    - "*.lan"
    - "*.localdomain"
    - time.windows.com
    - time.nist.gov
    - "*.ru"
    - "*.su"

